name: Wavefront CD

on:
  workflow_run:
    workflows: ["Wavefront CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: straylight-machine
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      vars.DEPLOY_ENABLED == 'true'
    runs-on: [self-hosted, macOS, straylight, deploy]
    environment: home-prod
    timeout-minutes: 30
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
      APP_PORT: ${{ vars.APP_PORT }}
    steps:
      - name: Checkout exact CI'd SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Verify checkout matches the SHA that passed CI
        run: |
          test "$(git rev-parse HEAD)" = "$DEPLOY_SHA" \
            || { echo "::error::HEAD != CI'd SHA ($DEPLOY_SHA)"; exit 1; }
          echo "Deploying exact SHA $DEPLOY_SHA"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Provision Python
        run: |
          uv python install 3.13
          echo "PYTHON=$(uv python find 3.13)" >> "$GITHUB_ENV"

      - name: make deploy
        run: |
          lock=/tmp/straylight-machine.lock
          if command -v flock >/dev/null 2>&1; then
            exec flock -w 1800 "$lock" make deploy
          else
            echo "::warning::flock missing - deploying without the host lock"; exec make deploy
          fi

      - name: make health
        run: make health
